<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <style>
      .logo-stroke { 
        stroke: #1464b4; 
        fill: none; 
        stroke-width: 18; 
        stroke-linecap: round; 
        stroke-linejoin: round; 
      }
      .logo-text { 
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
        font-weight: bold; 
        font-size: 72px; 
        fill: #1464b4; 
        letter-spacing: -1.5px; 
      }
    </style>
  </defs>

  <rect width="400" height="400" fill="transparent" />

  <rect x="135" y="80" width="130" height="130" rx="30" class="logo-stroke" />
  
  <path d="M 165 140 L 190 165 L 235 110" class="logo-stroke" />

  <text x="200" y="290" text-anchor="middle" class="logo-text">TuCrédito</text>
</svg>
